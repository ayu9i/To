<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conan Randomizer | The Mystery Door</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --conan-blue: #020b18;
            --conan-gold: #d4af37;
            --conan-red: #b22222;
            --conan-black: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        /* แก้ไขบัคเลื่อนไม่ได้: ใช้ overflow-x แทน และเอา height 100vh ออกจาก body หลัก */
        body {
            margin: 0;
            font-family: 'Kanit', sans-serif;
            background: #000;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(20, 40, 80, 0.5) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(60, 20, 20, 0.3) 0%, transparent 40%);
            color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        /* คลาสสำหรับล็อคหน้าจอชั่วคราวตอนสุ่ม */
        .stop-scrolling {
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .premium-card {
            background: var(--glass);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 24px;
            padding: 40px 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-top: 20px;
        }

        h1 {
            font-weight: 600;
            color: var(--conan-gold);
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .result-container {
            position: relative;
            margin: 20px 0;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .info-badge {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--conan-gold);
            border-radius: 50px;
            font-size: 0.9rem;
            color: var(--conan-gold);
            margin-bottom: 10px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .info-badge.show { opacity: 1; }

        .ep-display {
            font-size: 3.5rem;
            font-weight: 600;
            margin: 0;
            color: #fff;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease-out;
        }

        .ep-display.show {
            opacity: 1;
            transform: translateY(0);
        }

        .movie-title {
            font-size: 1.2rem;
            color: #ccc;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .movie-title.show { opacity: 1; }

        .btn-main {
            width: 100%;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 15px;
            font-family: 'Kanit';
        }

        .btn-gold { background: linear-gradient(135deg, #d4af37 0%, #f1d57a 100%); color: #000; }
        .btn-red { background: linear-gradient(135deg, #8b0000 0%, #e31e24 100%); color: #fff; }

        button:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Door System */
        .door-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
            display: flex;
        }

        .door {
            position: absolute;
            width: 50%; height: 100%;
            background-color: var(--conan-black);
            transition: transform 0.6s ease-in-out;
            display: flex;
            align-items: center;
        }

        .door-left {
            left: -50%;
            border-right: 2px solid var(--conan-gold);
            justify-content: flex-end;
        }

        .door-right {
            right: -50%;
            border-left: 2px solid var(--conan-gold);
            justify-content: flex-start;
        }

        .door-container.active .door-left { transform: translateX(100%); }
        .door-container.active .door-right { transform: translateX(-100%); }

        .keyhole {
            width: 40px; height: 60px;
            background: #d4af37 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="40" r="15" fill="%23000"/><path d="M40 50 L60 50 L70 90 L30 90 Z" fill="%23000"/></svg>') no-repeat center;
            border-radius: 5px;
            margin: 20px;
        }

        .season-selector {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
        }

        select {
            background: #111; color: var(--conan-gold);
            border: 1px solid var(--conan-gold);
            padding: 10px; border-radius: 8px;
            width: 90%; font-family: 'Kanit';
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="door-container" id="doorSystem">
    <div class="door door-left"><div class="keyhole"></div></div>
    <div class="door door-right"><div class="keyhole"></div></div>
</div>

<div class="container">
    <h1>DETECTIVE CONAN</h1>
    <p style="opacity: 0.6; margin-bottom: 20px;">iQIYI Continuous Database (1200+ Eps)</p>

    <div class="premium-card">
        <div id="badge" class="info-badge">สืบหาความจริง</div>
        <div class="result-container">
            <h2 id="epDisplay" class="ep-display">???</h2>
            <div id="movieTitle" class="movie-title"></div>
        </div>
        
        <button class="btn-main btn-gold" onclick="spinSeries()">สุ่มตอนทั้งหมด (1-24)</button>
        <button class="btn-main btn-red" onclick="spinMovie()">สุ่มเดอะมูฟวี่ (1-28)</button>

        <div class="season-selector">
            <p style="font-size: 0.9rem; margin-bottom: 10px; opacity: 0.8;">สุ่มเฉพาะซีซั่น</p>
            <select id="seasonPick"></select>
            <button onclick="spinFromSpecificSeason()" style="background:none; border:1px solid #fff; color:#fff; cursor:pointer; padding:8px 20px; border-radius:8px; font-family:'Kanit';">สุ่มในซีซั่นนี้</button>
        </div>
    </div>
    <p style="font-size: 0.7rem; opacity: 0.4; margin-top: 20px;">ความจริงมีเพียงหนึ่งเดียวเท่านั้น!</p>
</div>

<script>
    const totalSeasons = 24;
    const seasonRanges = [];
    let currentStart = 1;
    for (let i = 1; i <= totalSeasons; i++) {
        let count = (i <= 18) ? 44 : 52;
        let end = currentStart + count - 1;
        seasonRanges.push({ season: i, start: currentStart, end: end });
        currentStart = end + 1;
    }

    const select = document.getElementById('seasonPick');
    seasonRanges.forEach(r => {
        let opt = document.createElement('option');
        opt.value = r.season;
        opt.text = `ซีซั่น ${r.season} (ตอนที่ ${r.start}-${r.end})`;
        select.appendChild(opt);
    });

    const epDisplay = document.getElementById('epDisplay');
    const badge = document.getElementById('badge');
    const movieTitle = document.getElementById('movieTitle');
    const doors = document.getElementById('doorSystem');

    function startConanSpin(randomFn) {
        // ล็อคการเลื่อนหน้าจอ
        document.body.classList.add('stop-scrolling');
        
        // ปิดประตู
        doors.classList.add('active');
        
        // เคลียร์ค่าเก่าก่อนเปิดประตูใหม่
        setTimeout(() => {
            epDisplay.classList.remove('show');
            badge.classList.remove('show');
            movieTitle.classList.remove('show');
            randomFn(); 
        }, 600);

        // เปิดประตู
        setTimeout(() => {
            doors.classList.remove('active');
            // ปลดล็อคหน้าจอ
            document.body.classList.remove('stop-scrolling');
        }, 1400);

        // โชว์ผลลัพธ์
        setTimeout(() => {
            epDisplay.classList.add('show');
            badge.classList.add('show');
            if(movieTitle.innerText !== "") movieTitle.classList.add('show');
        }, 1800);
    }

    const seriesRandomFn = () => {
        const allMax = seasonRanges[totalSeasons-1].end;
        const randEp = Math.floor(Math.random() * allMax) + 1;
        const findS = seasonRanges.find(r => randEp >= r.start && randEp <= r.end);
        updateUI(`EP. ${randEp}`, `ซีซั่นที่ ${findS.season}`, "");
    };

    const specificSeasonRandomFn = () => {
        const sVal = select.value;
        const range = seasonRanges.find(r => r.season == sVal);
        const randEp = Math.floor(Math.random() * (range.end - range.start + 1)) + range.start;
        updateUI(`EP. ${randEp}`, `สุ่มจากซีซั่นที่ ${sVal}`, "");
    };

    const movieRandomFn = () => {
        const movie = Math.floor(Math.random() * 28) + 1;
        updateUI(`MOVIE ${movie}`, `เดอะมูฟวี่`, "ไขคดีปริศนาเดอะมูฟวี่");
    };

    function updateUI(main, bText, mText) {
        epDisplay.innerText = main;
        badge.innerText = bText;
        movieTitle.innerText = mText;
    }

    function spinSeries() { startConanSpin(seriesRandomFn); }
    function spinFromSpecificSeason() { startConanSpin(specificSeasonRandomFn); }
    function spinMovie() { startConanSpin(movieRandomFn); }
</script>

</body>
</html>
