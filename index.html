<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conan Randomizer | TrueID Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --conan-blue: #020b18;
            --conan-gold: #d4af37;
            --conan-red: #e31e24;
            --true-red: #ff0000;
            --conan-black: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Kanit', sans-serif;
            background: #000;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(20, 40, 80, 0.5) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(60, 20, 20, 0.3) 0%, transparent 40%);
            color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        .stop-scrolling { height: 100vh; overflow: hidden; }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .premium-card {
            background: var(--glass);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 24px;
            padding: 30px 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .result-container {
            margin: 20px 0;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .info-badge {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--conan-gold);
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--conan-gold);
            margin-bottom: 10px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .info-badge.show { opacity: 1; }

        .ep-display {
            font-size: 3.5rem;
            font-weight: 600;
            margin: 0;
            color: #fff;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease-out;
        }

        .ep-display.show { opacity: 1; transform: translateY(0); }

        .update-alert {
            font-size: 0.8rem;
            color: #00ffcc;
            background: rgba(0, 255, 204, 0.1);
            padding: 5px 10px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
        }

        .btn-main {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 15px;
            font-family: 'Kanit';
        }

        .btn-gold { background: linear-gradient(135deg, #d4af37 0%, #f1d57a 100%); color: #000; }
        .btn-true { background: linear-gradient(135deg, #ff0000 0%, #b20000 100%); color: #fff; border: 1px solid rgba(255,255,255,0.3); }
        .btn-red { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }

        /* Door System */
        .door-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
            display: flex;
        }

        .door {
            position: absolute;
            width: 50%; height: 100%;
            background-color: var(--conan-black);
            transition: transform 0.6s ease-in-out;
            display: flex;
            align-items: center;
        }

        .door-left { left: -50%; border-right: 2px solid var(--conan-gold); justify-content: flex-end; }
        .door-right { right: -50%; border-left: 2px solid var(--conan-gold); justify-content: flex-start; }
        .door-container.active .door-left { transform: translateX(100%); }
        .door-container.active .door-right { transform: translateX(-100%); }

        .keyhole { width: 40px; height: 60px; background: #d4af37 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="40" r="15" fill="%23000"/><path d="M40 50 L60 50 L70 90 L30 90 Z" fill="%23000"/></svg>') no-repeat center; border-radius: 5px; margin: 20px; }

        .label { font-size: 0.75rem; color: #888; text-transform: uppercase; margin-top: 15px; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="door-container" id="doorSystem">
    <div class="door door-left"><div class="keyhole"></div></div>
    <div class="door door-right"><div class="keyhole"></div></div>
</div>

<div class="container">
    <h1 style="color:white; margin-bottom: 0;">DETECTIVE CONAN</h1>
    <p style="color:var(--conan-gold); margin-top: 5px; letter-spacing: 1px;">RANDOMIZER HUB</p>

    <div class="premium-card">
        <div id="badge" class="info-badge">สืบหาความจริง</div>
        <div class="result-container">
            <h2 id="epDisplay" class="ep-display">???</h2>
            <div id="updateMsg" class="update-alert">เสาร์นี้ 21:00 น. พบกับ EP.11!</div>
        </div>
        
        <span class="label">TrueVisions Exclusive</span>
        <button class="btn-main btn-true" onclick="spinSeason25()">สุ่มซีซั่น 25 (TrueID)</button>
        
        <span class="label">iQIYI Archive (1-1200+)</span>
        <button class="btn-main btn-gold" onclick="spinArchive()">สุ่มตอน iQIYI ทั้งหมด</button>

        <span class="label">Special Contents</span>
        <button class="btn-main btn-red" onclick="spinMovie()">สุ่มเดอะมูฟวี่ (1-28)</button>
    </div>

    <p style="font-size: 0.7rem; opacity: 0.5; margin-top: 25px;">อ้างอิงข้อมูลล่าสุด: ตุลาคม 2025</p>
</div>

<script>
    // Config: ซีซั่น 25 TrueID (นับ 1, 2, 3...)
    const currentTrueEps = 10; // ปัจจุบันมี 10 ตอน

    // Config: ซีซั่น 1-24 iQIYI (นับต่อเนื่อง)
    const iqiyiMaxEp = 1200; 

    const epDisplay = document.getElementById('epDisplay');
    const badge = document.getElementById('badge');
    const updateMsg = document.getElementById('updateMsg');
    const doors = document.getElementById('doorSystem');

    function startConanSpin(randomFn) {
        document.body.classList.add('stop-scrolling');
        doors.classList.add('active');
        
        setTimeout(() => {
            epDisplay.classList.remove('show');
            badge.classList.remove('show');
            updateMsg.style.display = 'none';
            randomFn(); 
        }, 600);

        setTimeout(() => {
            doors.classList.remove('active');
            document.body.classList.remove('stop-scrolling');
        }, 1400);

        setTimeout(() => {
            epDisplay.classList.add('show');
            badge.classList.add('show');
        }, 1800);
    }

    // สุ่มซีซั่น 25 แบบ TrueID (1-10)
    const spinSeason25Fn = () => {
        const rand = Math.floor(Math.random() * currentTrueEps) + 1;
        updateUI(`EP. ${rand}`, `TrueVisions ซีซั่น 25`);
        updateMsg.style.display = 'block'; // โชว์ข้อความอัปเดตตอนที่ 11
    };

    // สุ่ม Archive iQIYI (1-1200)
    const spinArchiveFn = () => {
        const rand = Math.floor(Math.random() * iqiyiMaxEp) + 1;
        updateUI(`EP. ${rand}`, `iQIYI Continuous Series`);
    };

    // สุ่ม Movie
    const spinMovieFn = () => {
        const rand = Math.floor(Math.random() * 28) + 1;
        updateUI(`MOVIE ${rand}`, `Detective Conan Movie`);
    };

    function updateUI(main, bText) {
        epDisplay.innerText = main;
        badge.innerText = bText;
    }

    function spinSeason25() { startConanSpin(spinSeason25Fn); }
    function spinArchive() { startConanSpin(spinArchiveFn); }
    function spinMovie() { startConanSpin(spinMovieFn); }
</script>

</body>
</html>
