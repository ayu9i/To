<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conan Randomizer | iQIYI 1200+</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --conan-blue: #020b18;
            --conan-gold: #d4af37;
            --conan-red: #b22222;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Kanit', sans-serif;
            background: #050505;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(20, 40, 80, 0.5) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(60, 20, 20, 0.3) 0%, transparent 40%);
            color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
            text-align: center;
        }

        .premium-card {
            background: var(--glass);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 24px;
            padding: 40px 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        h1 {
            font-weight: 600;
            color: var(--conan-gold);
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .ep-display {
            font-size: 3.5rem;
            font-weight: 600;
            margin: 30px 0;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
            min-height: 90px;
        }

        .info-badge {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--conan-gold);
            border-radius: 50px;
            font-size: 0.9rem;
            color: var(--conan-gold);
            margin-bottom: 20px;
        }

        .btn-main {
            width: 100%;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 15px;
            font-family: 'Kanit';
        }

        .btn-gold {
            background: linear-gradient(135deg, #d4af37 0%, #f1d57a 100%);
            color: #000;
        }

        .btn-red {
            background: linear-gradient(135deg, #8b0000 0%, #e31e24 100%);
            color: #fff;
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .season-selector {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
        }

        select {
            background: #111;
            color: var(--conan-gold);
            border: 1px solid var(--conan-gold);
            padding: 8px;
            border-radius: 8px;
            width: 80%;
            font-family: 'Kanit';
        }

        .spinning {
            animation: flash 0.1s infinite;
        }

        @keyframes flash {
            0% { opacity: 0.5; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>DETECTIVE CONAN</h1>
    <p style="opacity: 0.6; margin-bottom: 30px;">iQIYI Random Database (Update 2025)</p>

    <div class="premium-card">
        <div id="badge" class="info-badge">พร้อมสืบหาความจริง</div>
        <div id="mainDisplay" class="ep-display">EP. ???</div>
        
        <button class="btn-main btn-gold" onclick="randomSeries()">สุ่มตอน (Series 1-24)</button>
        <button class="btn-main btn-red" onclick="randomMovie()">สุ่มเดอะมูฟวี่ (1-28)</button>

        <div class="season-selector">
            <p style="font-size: 0.9rem; margin-bottom: 10px;">เลือกเฉพาะซีซั่นที่ต้องการสุ่มตอน</p>
            <select id="seasonPick">
                <!-- JS will populate options -->
            </select>
            <button onclick="randomFromSpecificSeason()" style="margin-top:10px; background:none; border:1px solid #fff; color:#fff; cursor:pointer; padding:5px 15px; border-radius:5px;">สุ่มในซีซั่นนี้</button>
        </div>
    </div>

    <p style="font-size: 0.8rem; opacity: 0.4;">Data Reference: iQIYI Thailand 2025 (Continuous Ep. 1-12XX)</p>
</div>

<script>
    // ข้อมูลช่วงตอนแบบรันยาว (อ้างอิง iQIYI โดยประมาณ)
    // เฉลี่ยปีละ 44-52 ตอน จนถึงตอนที่ 1200+ ในปัจจุบัน
    const totalSeasons = 24;
    const epPerSeason = 50; // ค่าเฉลี่ยโดยประมาณเพื่อให้เลขตอนรวมถึง 1200 ในซีซั่น 24

    // สร้างข้อมูลช่วงตอนในแต่ละซีซั่น
    const seasonRanges = [];
    let currentStart = 1;
    for (let i = 1; i <= totalSeasons; i++) {
        let count = (i <= 18) ? 44 : 52; // ซีซั่นเก่ามักมี 44 ตอน ซีซั่นใหม่ๆ มี 52 ตอน
        let end = currentStart + count - 1;
        seasonRanges.push({ season: i, start: currentStart, end: end });
        currentStart = end + 1;
    }

    // Populate Select Dropdown
    const select = document.getElementById('seasonPick');
    seasonRanges.forEach(r => {
        let opt = document.createElement('option');
        opt.value = r.season;
        opt.text = `ซีซั่น ${r.season} (ตอนที่ ${r.start}-${r.end})`;
        select.appendChild(opt);
    });

    function randomSeries() {
        startEffect();
        setTimeout(() => {
            const allMax = seasonRanges[totalSeasons-1].end;
            const randEp = Math.floor(Math.random() * allMax) + 1;
            const findS = seasonRanges.find(r => randEp >= r.start && randEp <= r.end);
            
            updateDisplay(`EP. ${randEp}`, `ซีซั่น ${findS.season}`);
            stopEffect();
        }, 600);
    }

    function randomFromSpecificSeason() {
        const sVal = document.getElementById('seasonPick').value;
        const range = seasonRanges.find(r => r.season == sVal);
        startEffect();
        setTimeout(() => {
            const randEp = Math.floor(Math.random() * (range.end - range.start + 1)) + range.start;
            updateDisplay(`EP. ${randEp}`, `สุ่มจากซีซั่น ${sVal}`);
            stopEffect();
        }, 600);
    }

    function randomMovie() {
        startEffect();
        setTimeout(() => {
            const movie = Math.floor(Math.random() * 28) + 1;
            updateDisplay(`Movie ${movie}`, "เดอะมูฟวี่");
            stopEffect();
        }, 600);
    }

    function startEffect() {
        document.getElementById('mainDisplay').classList.add('spinning');
    }

    function stopEffect() {
        document.getElementById('mainDisplay').classList.remove('spinning');
    }

    function updateDisplay(main, badge) {
        document.getElementById('mainDisplay').innerText = main;
        document.getElementById('badge').innerText = badge;
    }
</script>

</body>
</html>
