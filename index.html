<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conan Randomizer | Mystery Door Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --conan-blue: #020b18;
            --conan-gold: #d4af37;
            --conan-red: #e31e24;
            --true-red: #ff0000;
            --conan-black: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Kanit', sans-serif;
            background: #000;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(20, 40, 80, 0.5) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(60, 20, 20, 0.3) 0%, transparent 40%);
            color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        .stop-scrolling { height: 100vh; overflow: hidden; }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .premium-card {
            background: var(--glass);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 24px;
            padding: 30px 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-top: 20px;
        }

        .result-container {
            margin: 20px 0;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .info-badge {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--conan-gold);
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--conan-gold);
            margin-bottom: 10px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .info-badge.show { opacity: 1; }

        .ep-display {
            font-size: 3.5rem;
            font-weight: 600;
            margin: 0;
            color: #fff;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease-out;
        }

        .ep-display.show { opacity: 1; transform: translateY(0); }

        .btn-main {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 12px;
            font-family: 'Kanit';
        }

        .btn-gold { background: linear-gradient(135deg, #d4af37 0%, #f1d57a 100%); color: #000; }
        .btn-true { background: linear-gradient(135deg, #ff0000 0%, #b20000 100%); color: #fff; }
        .btn-dark { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }

        /* Door System */
        .door-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
            display: flex;
        }

        .door {
            position: absolute;
            width: 50%; height: 100%;
            background-color: var(--conan-black);
            transition: transform 0.6s ease-in-out;
            display: flex;
            align-items: center;
        }

        .door-left { left: -50%; border-right: 2px solid var(--conan-gold); justify-content: flex-end; }
        .door-right { right: -50%; border-left: 2px solid var(--conan-gold); justify-content: flex-start; }
        .door-container.active .door-left { transform: translateX(100%); }
        .door-container.active .door-right { transform: translateX(-100%); }

        .keyhole { width: 40px; height: 60px; background: #d4af37 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="40" r="15" fill="%23000"/><path d="M40 50 L60 50 L70 90 L30 90 Z" fill="%23000"/></svg>') no-repeat center; border-radius: 5px; margin: 20px; }

        .label { font-size: 0.75rem; color: #888; text-transform: uppercase; margin-top: 15px; margin-bottom: 5px; display: block; text-align: left; padding-left: 5px; }

        .season-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        select {
            background: #111; color: var(--conan-gold);
            border: 1px solid var(--conan-gold);
            padding: 10px; border-radius: 8px;
            width: 100%; font-family: 'Kanit';
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="door-container" id="doorSystem">
    <div class="door door-left"><div class="keyhole"></div></div>
    <div class="door door-right"><div class="keyhole"></div></div>
</div>

<div class="container">
    <h1 style="color:white; margin-bottom: 0; letter-spacing: 2px;">DETECTIVE CONAN</h1>
    <p style="color:var(--conan-gold); margin-top: 5px; opacity: 0.8;">RANDOMIZER HUB</p>

    <div class="premium-card">
        <div id="badge" class="info-badge">สืบหาความจริง</div>
        <div class="result-container">
            <h2 id="epDisplay" class="ep-display">???</h2>
        </div>
        
        <span class="label">TrueVisions Exclusive</span>
        <button class="btn-main btn-true" onclick="spinSeason25()">สุ่มซีซั่น 25 (TrueID)</button>
        
        <span class="label">iQIYI Archive (1-1200+)</span>
        <button class="btn-main btn-gold" onclick="spinArchive()">สุ่มตอน iQIYI ทั้งหมด</button>

        <span class="label">Special Contents</span>
        <button class="btn-main btn-dark" onclick="spinMovie()">สุ่มเดอะมูฟวี่ (1-28)</button>

        <div class="season-box">
            <span class="label" style="margin-top: 0;">สุ่มเฉพาะซีซั่น (iQIYI)</span>
            <select id="seasonPick"></select>
            <button onclick="spinSpecific()" style="background:none; border:1px solid #fff; color:#fff; cursor:pointer; padding:8px 15px; border-radius:8px; font-family:'Kanit'; width: 100%;">สุ่มในซีซั่นที่เลือก</button>
        </div>
    </div>

    <p style="font-size: 0.7rem; opacity: 0.4; margin-top: 25px;">อัปเดตล่าสุด: EP.11 ซีซั่น 25 มาวันเสาร์นี้!</p>
</div>

<script>
    // Logic ข้อมูลซีซั่น 1-24
    const totalSeasons = 24;
    const seasonRanges = [];
    let currentStart = 1;
    for (let i = 1; i <= totalSeasons; i++) {
        let count = (i <= 18) ? 44 : 52;
        let end = currentStart + count - 1;
        seasonRanges.push({ season: i, start: currentStart, end: end });
        currentStart = end + 1;
    }

    // ใส่ข้อมูลใน Select
    const select = document.getElementById('seasonPick');
    seasonRanges.forEach(r => {
        let opt = document.createElement('option');
        opt.value = r.season;
        opt.text = `ซีซั่น ${r.season} (ตอนที่ ${r.start}-${r.end})`;
        select.appendChild(opt);
    });

    const epDisplay = document.getElementById('epDisplay');
    const badge = document.getElementById('badge');
    const doors = document.getElementById('doorSystem');

    function startConanSpin(randomFn) {
        document.body.classList.add('stop-scrolling');
        doors.classList.add('active');
        
        setTimeout(() => {
            epDisplay.classList.remove('show');
            badge.classList.remove('show');
            randomFn(); 
        }, 600);

        setTimeout(() => {
            doors.classList.remove('active');
            document.body.classList.remove('stop-scrolling');
        }, 1400);

        setTimeout(() => {
            epDisplay.classList.add('show');
            badge.classList.add('show');
        }, 1800);
    }

    const spinSeason25Fn = () => {
        const rand = Math.floor(Math.random() * 10) + 1;
        updateUI(`EP. ${rand}`, `TrueVisions ซีซั่น 25`);
    };

    const spinArchiveFn = () => {
        const rand = Math.floor(Math.random() * seasonRanges[totalSeasons-1].end) + 1;
        updateUI(`EP. ${rand}`, `iQIYI Continuous Series`);
    };

    const spinSpecificFn = () => {
        const sVal = select.value;
        const range = seasonRanges.find(r => r.season == sVal);
        const rand = Math.floor(Math.random() * (range.end - range.start + 1)) + range.start;
        updateUI(`EP. ${rand}`, `ซีซั่นที่ ${sVal}`);
    };

    const spinMovieFn = () => {
        const rand = Math.floor(Math.random() * 28) + 1;
        updateUI(`MOVIE ${rand}`, `Detective Conan Movie`);
    };

    function updateUI(main, bText) {
        epDisplay.innerText = main;
        badge.innerText = bText;
    }

    function spinSeason25() { startConanSpin(spinSeason25Fn); }
    function spinArchive() { startConanSpin(spinArchiveFn); }
    function spinSpecific() { startConanSpin(spinSpecificFn); }
    function spinMovie() { startConanSpin(spinMovieFn); }
</script>

</body>
</html>
